<style>

:root{
--gold:#d4af37;
}

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#000;
color:#fff;
}

/* INFO */

.info{
text-align:center;
padding:15px 15px 5px 15px;
}

.info h2{
color:var(--gold);
margin-bottom:8px;
}

/* MOVING IMAGES */

.slider{
overflow:hidden;
width:100%;
margin-top:10px;
}

.slide-track{
display:flex;
width:200%;
animation:scroll 6s linear infinite;
}

.slide-track img{
width:320px;
height:180px;
object-fit:cover;
margin:10px;
border:2px solid var(--gold);
border-radius:6px;
}

/* FAST MOVEMENT */

@keyframes scroll{

0%{
transform:translateX(-10%);
}

100%{
transform:translateX(-50%);
}

}

/* PRODUCT GRID */

.gallery{
max-width:1100px;
margin:25px auto;
display:grid;
grid-template-columns:repeat(2,1fr);
gap:14px;
padding:0 10px;
}

.gallery img{
width:100%;
height:190px;
object-fit:cover;
border-radius:6px;
border:2px solid var(--gold);
box-shadow:0 0 10px rgba(212,175,55,0.5);
}

/* FORM */

.form-box{
max-width:850px;
margin:40px auto;
padding:25px;
background:#050505;
border:1px solid var(--gold);
}

.form-box h2{
text-align:center;
color:var(--gold);
}

label{
display:block;
margin-top:14px;
font-weight:bold;
}

input,select,textarea{
width:100%;
padding:10px;
margin-top:5px;
background:#020617;
border:1px solid #333;
color:#fff;
}

textarea{
height:100px;
}

button{
width:100%;
margin-top:20px;
padding:15px;
background:var(--gold);
border:none;
font-weight:bold;
cursor:pointer;
}

/* FLOAT BUTTONS */

.whatsapp{
position:fixed;
right:15px;
bottom:140px;
background:#25d366;
color:white;
padding:14px 18px;
border-radius:40px;
text-decoration:none;
font-weight:bold;
}

.call{
position:fixed;
right:15px;
bottom:95px;
background:#2563eb;
color:white;
padding:14px 18px;
border-radius:40px;

}

.tiktok{

border-radius:40px;

text-decoration:none;

footer{

padding:15px;
background:#000;
color:#aaa;
}
